services:
  - type: web
    name: trainingsplaner-strapi
    env: node
    plan: starter
    region: frankfurt
    buildCommand: yarn install && yarn build
    startCommand: rsync -a public/ /data/public/ && yarn start
    healthCheckPath: /_health
    autoDeploy: true
    disk:
      mountPath: /data
      name: strapi-data
      sizeGB: 1
    envVars:
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: APP_KEYS
        generateValue: true
      - key: DATABASE_CLIENT
        value: mysql
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.x
